<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 170" role="img" aria-label="ccfuel — fuel gauge for Claude Code">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#244a73"/>
      <stop offset="1" stop-color="#16202e"/>
    </linearGradient>
  </defs>
  <rect width="560" height="170" rx="28" fill="url(#bg)"/>

  <!-- fuel gauge mark -->
  <g>
    <path d="M 58 100 A 34 34 0 0 1 126 100" fill="none" stroke="#3c4d63" stroke-width="9" stroke-linecap="round"/>
    <path d="M 58 100 A 34 34 0 0 1 110 73" fill="none" stroke="#22c55e" stroke-width="9" stroke-linecap="round"/>
    <line x1="92" y1="100" x2="109" y2="74" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round"/>
    <circle cx="92" cy="100" r="6" fill="#ffffff"/>
  </g>

  <!-- wordmark -->
  <text x="178" y="92" font-family="'IBM Plex Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace"
        font-size="62" font-weight="700" fill="#ffffff" letter-spacing="-1">ccfuel</text>
  <!-- tagline -->
  <text x="180" y="124" font-family="'IBM Plex Sans', ui-sans-serif, system-ui, sans-serif"
        font-size="20" font-weight="500" fill="#9fb3c8">Fuel gauge for Claude Code</text>
</svg>
